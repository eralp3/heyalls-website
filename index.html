  <body class="bg-[#001a2c] text-white">
    <div id="initial-loader" style="position: fixed; inset: 0; z-index: 99999; background-color: #001a2c; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;">

        </div>
      </div>
    </div>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
